<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pinboard</title>
        <script type="importmap">
            {
                "imports": {
                    "vue": "https://cdn.jsdelivr.net/npm/vue@3.5.32/dist/vue.esm-browser.js",
                    "vue-router": "https://cdn.jsdelivr.net/npm/vue-router@5.0.4/dist/vue-router.esm-browser.prod.js",
                    "@graffiti-garden/implementation-local": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-local@1.2.0/dist/browser/index.js",
                    "@graffiti-garden/implementation-decentralized": "https://cdn.jsdelivr.net/npm/@graffiti-garden/implementation-decentralized@0.0.9/dist/browser/index.js",
                    "@graffiti-garden/wrapper-vue": "https://cdn.jsdelivr.net/npm/@graffiti-garden/wrapper-vue@1.2.2/dist/browser/plugin.mjs"
                }
            }
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
        <script src="./main.js" type="module"></script>
    </head>
    <body>
        <div id="app">Loading...</div>
        <template id="template">
            <template v-if="!session">
                <router-view />
            </template>
            <template v-else>
                <div class="app-root-logged-in">
                    <header class="app-shell-header">
                        <span class="app-shell-header-spacer" aria-hidden="true"></span>
                        <h1 class="app-shell-title">
                            <router-link to="/">Pinboard</router-link>
                        </h1>
                        <div class="app-shell-actions">
                            <nav class="app-shell-nav">
                                <router-link :to="`/profile/${session.actor}`">Profile</router-link>
                            </nav>
                            <button
                                type="button"
                                class="app-shell-logout"
                                @click="$graffiti.logout(session)"
                            >
                                Log Out
                            </button>
                        </div>
                    </header>
                    <div class="app-shell-stage">
                        <router-view />
                    </div>
                </div>
            </template>
        </template>
    </body>
</html>
